<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Works | Han bo bae Portfolio</title>
    <meta
      name="description"
      content="한보배 웹디자인 포트폴리오 작업물"
    />
    <link rel="preconnect" href="https://cdn.jsdelivr.net" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css"
    />
    <link rel="stylesheet" href="./styles.css?v=20260617e" />
  </head>
  <body>
    <div class="noise" aria-hidden="true"></div>
    <div class="cursor" aria-hidden="true"></div>

    <header class="site-header" data-elevate>
      <a class="brand" href="./index.html">Portfolio</a>
      <nav class="nav" aria-label="주요 메뉴">
        <a href="./index.html#about">About</a>
        <a href="./work.html" aria-current="page">Works</a>
        <a href="./index.html#contact">Contact</a>
      </nav>
    </header>

    <main>
      <section class="section work-page-hero">
        <p class="eyebrow reveal">Selected Works</p>
        <h1 class="reveal">
          목적에 맞는 디자인,<br />
          성과로 이어지는 결과
        </h1>
        <p class="hero-description reveal">
          상세페이지, 브랜딩, 콘텐츠 제작까지<br>
          브랜드의 가치를 효과적으로 전달하고 전환을 만드는 디자인을 제공합니다.
        </p>
      </section>

      <section class="section category-work reveal" data-work-page>
        <div class="category-tabs main-category-tabs" aria-label="대카테고리">
          <button type="button" data-category-tab="detail">상세페이지</button>
          <button type="button" data-category-tab="branding">브랜딩</button>
          <button type="button" data-category-tab="photo">제품촬영</button>
          <button type="button" data-category-tab="video">영상편집</button>
        </div>

        <div class="category-panel" data-category-panel="detail">
          <div class="category-heading">
            <span>01</span>
            <h2>상세페이지</h2>
          </div>
          <div class="subcategory-tabs" aria-label="상세페이지 하위 카테고리">
            <button type="button" class="is-active" data-subcategory-tab="all">all</button>
            <button type="button" data-subcategory-tab="living">생활가전/용품</button>
            <button type="button" data-subcategory-tab="kitchen">주방가전</button>
            <button type="button" data-subcategory-tab="beauty">뷰티/패션</button>
            <button type="button" data-subcategory-tab="food">푸드/헬스</button>
          </div>
          <div class="detail-grid" data-detail-grid="all"></div>
        </div>

        <div class="category-panel" data-category-panel="branding">
          <div class="category-heading">
            <span>02</span>
            <h2>브랜딩</h2>
          </div>
          <div class="detail-grid"></div>
        </div>

        <div class="category-panel" data-category-panel="photo">
          <div class="category-heading">
            <span>03</span>
            <h2>제품촬영</h2>
          </div>
          <div class="detail-grid"></div>
        </div>

        <div class="category-panel" data-category-panel="video">
          <div class="category-heading">
            <span>04</span>
            <h2>영상편집</h2>
          </div>
          <div class="detail-grid"></div>
        </div>
      </section>
    </main>

    <footer class="footer">
      <span>© 2026 Han bo bae Portfolio</span>
      <a href="./index.html#contact">Contact</a>
    </footer>

    <script src="./script.js?v=20260617e"></script>
  </body>
</html>
